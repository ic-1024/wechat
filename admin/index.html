<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服装推荐系统 - 后台管理</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; color: #333; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 200px; background: #fff; border-right: 1px solid #e8e8e8; flex-shrink: 0; }
    .sidebar-header { padding: 16px; font-weight: 600; font-size: 16px; color: #333; border-bottom: 1px solid #f0f0f0; }
    .sidebar nav a { display: block; padding: 12px 16px; color: #666; text-decoration: none; transition: all .2s; cursor: pointer; }
    .sidebar nav a:hover { background: #f5f5f5; color: #1890ff; }
    .sidebar nav a.active { background: #e6f7ff; color: #1890ff; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .main-header { background: #fff; padding: 12px 20px; border-bottom: 1px solid #e8e8e8; display: flex; justify-content: space-between; align-items: center; }
    .main-header h1 { font-size: 18px; font-weight: 500; }
    .main-content { flex: 1; overflow-y: auto; padding: 20px; }
    .page-section { display: none; }
    .page-section.active { display: block; }
    .carousel { height: 200px; background: #fff; border-radius: 8px; margin-bottom: 20px; overflow: hidden; border: 1px solid #e8e8e8; }
    .carousel-inner { display: flex; height: 100%; transition: transform 0.4s ease; }
    .carousel-item { min-width: 100%; height: 100%; }
    .carousel-item img { width: 100%; height: 100%; object-fit: cover; }
    .carousel-wrap { position: relative; }
    .carousel-nav { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 1; }
    .carousel-nav span { width: 8px; height: 8px; border-radius: 50%; background: rgba(0,0,0,0.2); cursor: pointer; }
    .carousel-nav span.active { background: #1890ff; }
    .row { display: flex; gap: 20px; margin-bottom: 20px; }
    .card { flex: 1; background: #fff; border-radius: 8px; padding: 20px; border: 1px solid #e8e8e8; }
    .card h3 { font-size: 14px; color: #666; margin-bottom: 12px; }
    .chart { height: 250px; }
    .stats { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
    .stat-item { flex: 1; min-width: 120px; padding: 16px; background: #fff; border-radius: 8px; border: 1px solid #e8e8e8; }
    .stat-item .val { font-size: 24px; font-weight: 600; color: #333; }
    .stat-item .label { font-size: 12px; color: #999; margin-top: 4px; }
    .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #1890ff; color: #fff; }
    .btn-outline { background: transparent; border: 1px solid #d9d9d9; color: #666; }
    .btn-danger { background: #ff4d4f; color: #fff; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
    table th, table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    table th { background: #fafafa; color: #666; font-weight: 500; }
    table tr:hover { background: #fafafa; }
    .table-wrap { background: #fff; border-radius: 8px; border: 1px solid #e8e8e8; overflow: hidden; }
    .table-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
    .table-header h3 { font-size: 16px; font-weight: 500; }
    .tag { display: inline-block; padding: 2px 8px; background: #f0f5ff; color: #1890ff; border-radius: 4px; font-size: 12px; margin: 2px; }
    .img-thumb { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; background: #f5f5f5; }
    .empty { text-align: center; padding: 40px; color: #999; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">服装推荐系统</div>
      <nav id="sideNav">
        <a class="active" data-page="dashboard">数据概览</a>
        <a data-page="wardrobe">服装管理</a>
        <a data-page="categories">分类管理</a>
        <a data-page="users">用户管理</a>
      </nav>
    </aside>
    <main class="main">
      <header class="main-header">
        <h1 id="pageTitle">数据概览</h1>
        <div>
          <span id="adminName" style="margin-right:12px;color:#666"></span>
          <button class="btn btn-outline" id="logoutBtn">退出登录</button>
        </div>
      </header>
      <div class="main-content">
        <!-- 数据概览 -->
        <div id="page-dashboard" class="page-section active">
          <div class="carousel-wrap">
            <div class="carousel">
              <div class="carousel-inner" id="carouselInner">
                <div class="carousel-item"><img src="./assets/carousel1.svg" alt="1"></div>
                <div class="carousel-item"><img src="./assets/carousel2.svg" alt="2"></div>
                <div class="carousel-item"><img src="./assets/carousel3.svg" alt="3"></div>
              </div>
            </div>
            <div class="carousel-nav" id="carouselNav"></div>
          </div>
          <div class="stats" id="stats">
            <div class="stat-item"><div class="val" id="statWardrobe">0</div><div class="label">服装总数</div></div>
            <div class="stat-item"><div class="val" id="statCategory">0</div><div class="label">分类数量</div></div>
            <div class="stat-item"><div class="val" id="statUser">0</div><div class="label">注册用户</div></div>
          </div>
          <div class="row">
            <div class="card"><h3>分类分布</h3><div id="chartCategory" class="chart"></div></div>
            <div class="card"><h3>场景分布</h3><div id="chartScene" class="chart"></div></div>
          </div>
        </div>

        <!-- 服装管理 -->
        <div id="page-wardrobe" class="page-section">
          <div class="table-wrap">
            <div class="table-header"><h3>全部服装</h3></div>
            <table>
              <thead><tr><th>图片</th><th>名称</th><th>分类</th><th>标签</th><th>场景</th><th>天气</th><th>所属用户</th></tr></thead>
              <tbody id="wardrobeBody"></tbody>
            </table>
          </div>
        </div>

        <!-- 分类管理 -->
        <div id="page-categories" class="page-section">
          <div class="table-wrap">
            <div class="table-header"><h3>服装分类</h3></div>
            <table>
              <thead><tr><th>ID</th><th>名称</th><th>排序</th></tr></thead>
              <tbody id="categoryBody"></tbody>
            </table>
          </div>
          <div class="table-wrap" style="margin-top:20px">
            <div class="table-header"><h3>使用场景</h3></div>
            <table>
              <thead><tr><th>ID</th><th>名称</th></tr></thead>
              <tbody id="sceneBody"></tbody>
            </table>
          </div>
        </div>

        <!-- 用户管理 -->
        <div id="page-users" class="page-section">
          <div class="table-wrap">
            <div class="table-header"><h3>注册用户</h3></div>
            <table>
              <thead><tr><th>ID</th><th>用户名</th><th>昵称</th><th>OpenID</th><th>注册时间</th></tr></thead>
              <tbody id="userBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    (function() {
      var PAGE_TITLES = { dashboard: '数据概览', wardrobe: '服装管理', categories: '分类管理', users: '用户管理' };

      /* --- 导航切换 --- */
      document.getElementById('sideNav').addEventListener('click', function(e) {
        var a = e.target.closest('a[data-page]');
        if (!a) return;
        var page = a.dataset.page;
        document.querySelectorAll('#sideNav a').forEach(function(el) { el.classList.remove('active'); });
        a.classList.add('active');
        document.querySelectorAll('.page-section').forEach(function(el) { el.classList.remove('active'); });
        var target = document.getElementById('page-' + page);
        if (target) target.classList.add('active');
        document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || '';
        if (page === 'wardrobe') loadWardrobe();
        if (page === 'categories') { loadCategories(); loadScenes(); }
        if (page === 'users') loadUsers();
      });

      /* --- 轮播 --- */
      var carouselIdx = 0;
      (function carouselInit() {
        var inner = document.getElementById('carouselInner');
        var nav = document.getElementById('carouselNav');
        for (var i = 0; i < 3; i++) {
          var dot = document.createElement('span');
          dot.dataset.idx = i;
          nav.appendChild(dot);
        }
        nav.addEventListener('click', function(e) {
          if (e.target.tagName === 'SPAN') { carouselIdx = +e.target.dataset.idx; update(); }
        });
        function update() {
          inner.style.transform = 'translateX(-' + carouselIdx * 100 + '%)';
          nav.querySelectorAll('span').forEach(function(s, i) { s.classList.toggle('active', i === carouselIdx); });
        }
        setInterval(function() { carouselIdx = (carouselIdx + 1) % 3; update(); }, 4000);
        update();
      })();

      /* --- 登录检查 --- */
      function checkLogin() {
        return fetch('/api/admin/check', { credentials: 'include' }).then(function(r) { return r.json(); }).then(function(j) {
          if (!j.data || !j.data.logged) { window.location.href = './login.html'; }
          document.getElementById('adminName').textContent = localStorage.getItem('adminName') || 'admin';
        });
      }
      document.getElementById('logoutBtn').onclick = function() {
        fetch('/api/admin/logout', { method: 'POST', credentials: 'include' }).then(function() {
          window.location.href = './login.html';
        });
      };

      /* --- 数据概览 --- */
      function loadDashboard() {
        Promise.all([
          fetch('/api/wardrobe', { credentials: 'include' }).then(function(r) { return r.json(); }),
          fetch('/api/categories', { credentials: 'include' }).then(function(r) { return r.json(); }),
          fetch('/api/scenes', { credentials: 'include' }).then(function(r) { return r.json(); }),
          fetch('/api/admin/users', { credentials: 'include' }).then(function(r) { return r.json(); }).catch(function() { return { data: [] }; })
        ]).then(function(results) {
          var wj = results[0], cj = results[1], sj = results[2], uj = results[3];
          var list = (wj.data && wj.data.list) || [];
          var cats = cj.data || [];
          var users = uj.data || [];
          document.getElementById('statWardrobe').textContent = list.length;
          document.getElementById('statCategory').textContent = cats.length;
          document.getElementById('statUser').textContent = users.length;

          var catMap = {};
          list.forEach(function(i) { catMap[i.category] = (catMap[i.category] || 0) + 1; });
          var sceneMap = {};
          list.forEach(function(i) { (i.scene || []).forEach(function(s) { sceneMap[s] = (sceneMap[s] || 0) + 1; }); });

          var chartCat = echarts.init(document.getElementById('chartCategory'));
          chartCat.setOption({
            tooltip: { trigger: 'item' },
            series: [{ type: 'pie', radius: '60%', data: Object.keys(catMap).map(function(n) { return { name: n, value: catMap[n] }; }) }]
          });

          var chartScene = echarts.init(document.getElementById('chartScene'));
          chartScene.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: Object.keys(sceneMap) },
            yAxis: { type: 'value' },
            series: [{ type: 'bar', data: Object.keys(sceneMap).map(function(k) { return sceneMap[k]; }), itemStyle: { color: '#1890ff' } }]
          });
        });
      }

      /* --- 服装管理 --- */
      function loadWardrobe() {
        fetch('/api/wardrobe', { credentials: 'include' }).then(function(r) { return r.json(); }).then(function(j) {
          var list = (j.data && j.data.list) || [];
          var body = document.getElementById('wardrobeBody');
          if (list.length === 0) { body.innerHTML = '<tr><td colspan="7" class="empty">暂无服装数据</td></tr>'; return; }
          body.innerHTML = list.map(function(item) {
            var img = item.image ? '<img class="img-thumb" src="' + item.image + '" onerror="this.style.display=\'none\'">' : '-';
            var tags = (item.tags || []).map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('');
            var scenes = (item.scene || []).map(function(s) { return '<span class="tag">' + s + '</span>'; }).join('');
            var weathers = (item.weather || []).join(', ');
            return '<tr><td>' + img + '</td><td>' + item.name + '</td><td>' + item.category + '</td><td>' + (tags || '-') + '</td><td>' + (scenes || '-') + '</td><td>' + (weathers || '-') + '</td><td>' + (item.userId || '公共') + '</td></tr>';
          }).join('');
        });
      }

      /* --- 分类管理 --- */
      function loadCategories() {
        fetch('/api/categories', { credentials: 'include' }).then(function(r) { return r.json(); }).then(function(j) {
          var cats = j.data || [];
          var body = document.getElementById('categoryBody');
          body.innerHTML = cats.map(function(c) {
            return '<tr><td>' + c.id + '</td><td>' + c.name + '</td><td>' + c.order + '</td></tr>';
          }).join('');
        });
      }

      function loadScenes() {
        fetch('/api/scenes', { credentials: 'include' }).then(function(r) { return r.json(); }).then(function(j) {
          var scenes = j.data || [];
          var body = document.getElementById('sceneBody');
          body.innerHTML = scenes.map(function(s) {
            return '<tr><td>' + s.id + '</td><td>' + s.name + '</td></tr>';
          }).join('');
        });
      }

      /* --- 用户管理 --- */
      function loadUsers() {
        fetch('/api/admin/users', { credentials: 'include' }).then(function(r) { return r.json(); }).then(function(j) {
          var users = j.data || [];
          var body = document.getElementById('userBody');
          if (users.length === 0) { body.innerHTML = '<tr><td colspan="5" class="empty">暂无用户</td></tr>'; return; }
          body.innerHTML = users.map(function(u) {
            return '<tr><td>' + u.id + '</td><td>' + u.username + '</td><td>' + (u.nickname || '-') + '</td><td>' + (u.openid || '-') + '</td><td>' + (u.createTime || '-') + '</td></tr>';
          }).join('');
        }).catch(function() {
          document.getElementById('userBody').innerHTML = '<tr><td colspan="5" class="empty">加载失败</td></tr>';
        });
      }

      checkLogin().then(loadDashboard);
    })();
  </script>
</body>
</html>
