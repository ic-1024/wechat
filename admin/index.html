<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服装推荐系统 - 后台管理</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; color: #333; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 200px; background: #fff; border-right: 1px solid #e8e8e8; flex-shrink: 0; }
    .sidebar-header { padding: 16px; font-weight: 600; font-size: 16px; color: #333; border-bottom: 1px solid #f0f0f0; }
    .sidebar nav a { display: block; padding: 12px 16px; color: #666; text-decoration: none; transition: all .2s; }
    .sidebar nav a:hover { background: #f5f5f5; color: #1890ff; }
    .sidebar nav a.active { background: #e6f7ff; color: #1890ff; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .main-header { background: #fff; padding: 12px 20px; border-bottom: 1px solid #e8e8e8; display: flex; justify-content: space-between; align-items: center; }
    .main-header h1 { font-size: 18px; font-weight: 500; }
    .main-content { flex: 1; overflow-y: auto; padding: 20px; }
    .carousel { height: 200px; background: #fff; border-radius: 8px; margin-bottom: 20px; overflow: hidden; border: 1px solid #e8e8e8; }
    .carousel-inner { display: flex; height: 100%; transition: transform 0.4s ease; }
    .carousel-item { min-width: 100%; height: 100%; }
    .carousel-item img { width: 100%; height: 100%; object-fit: cover; }
    .carousel-nav { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
    .carousel-nav span { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; }
    .carousel-nav span.active { background: #fff; }
    .carousel-wrap { position: relative; }
    .row { display: flex; gap: 20px; margin-bottom: 20px; }
    .card { flex: 1; background: #fff; border-radius: 8px; padding: 20px; border: 1px solid #e8e8e8; }
    .card h3 { font-size: 14px; color: #666; margin-bottom: 12px; }
    .chart { height: 250px; }
    .stats { display: flex; gap: 20px; flex-wrap: wrap; }
    .stat-item { flex: 1; min-width: 120px; padding: 16px; background: #fff; border-radius: 8px; border: 1px solid #e8e8e8; }
    .stat-item .val { font-size: 24px; font-weight: 600; color: #333; }
    .stat-item .label { font-size: 12px; color: #999; margin-top: 4px; }
    .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #1890ff; color: #fff; }
    .btn-outline { background: transparent; border: 1px solid #d9d9d9; color: #666; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">服装推荐系统</div>
      <nav>
        <a href="#" class="active" data-page="dashboard">数据概览</a>
        <a href="#" data-page="wardrobe">服装管理</a>
        <a href="#" data-page="categories">分类管理</a>
      </nav>
    </aside>
    <main class="main">
      <header class="main-header">
        <h1>数据概览</h1>
        <div>
          <span id="adminName" style="margin-right:12px;color:#666"></span>
          <button class="btn btn-outline" id="logoutBtn">退出登录</button>
        </div>
      </header>
      <div class="main-content">
        <div class="carousel-wrap">
          <div class="carousel">
            <div class="carousel-inner" id="carouselInner">
              <div class="carousel-item"><img src="./assets/carousel1.svg" alt="1"></div>
              <div class="carousel-item"><img src="./assets/carousel2.svg" alt="2"></div>
              <div class="carousel-item"><img src="./assets/carousel3.svg" alt="3"></div>
            </div>
          </div>
          <div class="carousel-nav" id="carouselNav"></div>
        </div>
        <div class="stats" id="stats">
          <div class="stat-item"><div class="val" id="statWardrobe">0</div><div class="label">服装总数</div></div>
          <div class="stat-item"><div class="val" id="statCategory">0</div><div class="label">分类数量</div></div>
        </div>
        <div class="row">
          <div class="card">
            <h3>分类分布</h3>
            <div id="chartCategory" class="chart"></div>
          </div>
          <div class="card">
            <h3>场景分布</h3>
            <div id="chartScene" class="chart"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    (function() {
      const API = '';
      let carouselIdx = 0, carouselTimer;
      const carouselLen = 3;

      function carouselInit() {
        const inner = document.getElementById('carouselInner');
        const nav = document.getElementById('carouselNav');
        for (let i = 0; i < carouselLen; i++) {
          const dot = document.createElement('span');
          dot.addEventListener('click', () => { carouselIdx = i; updateCarousel(); });
          nav.appendChild(dot);
        }
        function updateCarousel() {
          inner.style.transform = 'translateX(-' + carouselIdx * 100 + '%)';
          nav.querySelectorAll('span').forEach((s, i) => s.classList.toggle('active', i === carouselIdx));
        }
        carouselTimer = setInterval(() => {
          carouselIdx = (carouselIdx + 1) % carouselLen;
          updateCarousel();
        }, 4000);
        updateCarousel();
      }
      carouselInit();

      async function checkLogin() {
        const r = await fetch('/api/admin/check', { credentials: 'include' });
        const j = await r.json();
        if (!j.data || !j.data.logged) {
          window.location.href = './login.html';
          return;
        }
        document.getElementById('adminName').textContent = localStorage.getItem('adminName') || '管理员';
      }

      document.getElementById('logoutBtn').onclick = async () => {
        await fetch('/api/admin/logout', { method: 'POST', credentials: 'include' });
        window.location.href = './login.html';
      };

      async function loadStats() {
        const [wardrobeRes, catRes] = await Promise.all([
          fetch('/api/wardrobe', { credentials: 'include' }),
          fetch('/api/categories', { credentials: 'include' })
        ]);
        const wj = await wardrobeRes.json();
        const cj = await catRes.json();
        const list = (wj.data && wj.data.list) || [];
        const cats = (cj.data) || [];
        document.getElementById('statWardrobe').textContent = list.length;
        document.getElementById('statCategory').textContent = cats.length;

        const catMap = {};
        list.forEach(i => { catMap[i.category] = (catMap[i.category] || 0) + 1; });
        const sceneMap = {};
        list.forEach(i => {
          (i.scene || []).forEach(s => { sceneMap[s] = (sceneMap[s] || 0) + 1; });
        });

        const chartCat = echarts.init(document.getElementById('chartCategory'));
        chartCat.setOption({
          tooltip: { trigger: 'item' },
          series: [{ type: 'pie', radius: '60%', data: Object.entries(catMap).map(([n, v]) => ({ name: n, value: v })) }]
        });

        const chartScene = echarts.init(document.getElementById('chartScene'));
        chartScene.setOption({
          tooltip: { trigger: 'axis' },
          xAxis: { type: 'category', data: Object.keys(sceneMap) },
          yAxis: { type: 'value' },
          series: [{ type: 'bar', data: Object.values(sceneMap), itemStyle: { color: '#1890ff' } }]
        });
      }

      checkLogin().then(loadStats);
    })();
  </script>
</body>
</html>
